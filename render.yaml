services:
  - type: web
    name: mi-app-django
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: SECRET_KEY
        generateValue: true
    buildCommand: docker build -f deploy/Dockerfile -t app .
    startCommand: gunicorn --bind 0.0.0.0:8000 --workers 4 SGIEVpy.wsgi:application
